        }

        }

        .bigbox {

            gap: 20px;
            margin-bottom: 40px;
        }

        .small-img {
            display: none;
        }

        @media screen and (max-width: 1350px) {
            body {
                margin: 20px 60px;
            }

            .smallbox {
                display: none;
            }

            .img {
                display: block;
            }

            .logo {
                flex-wrap: wrap;
            }

            .box3 {

                flex-direction: column;
                align-items: center;
                gap: 20px;
            }

            .box3 p {
                margin: 0;
                text-align: center;
            }

            .box3 h1 {
                background-color: #B9FF66;
            }
        }

        @media screen and (max-width: 1000px) {
            body {
                margin: 25px 25px;
            }

            .bigbox {
                flex-wrap: wrap;
                /*flex-direction: column;
                gap: 20px;*/
            }

            .content {
                width: 100%;
            }

            .content p {
                display: none;
            }

            .picture {
                display: none;
            }

            .small-img {
                display: block;
            }
        }

        @media screen and (max-width: 500px) {
            .bigbox {
                justify-content: center;
            }

            }
