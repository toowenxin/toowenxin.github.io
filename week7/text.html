<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.relative {
            position: relative;
            border: 5px green solid;
            width: 50%;
            height: 200px;
            margin: auto;
            /*opacity: 0;
            display: none;*/
        }

        div.box1 {
            position: absolute;
            border: 5px rgb(45, 0, 128) solid;
            right: -20px;
            top: 20px;
        }

        div.box2 {
            position: absolute;
            border: 5px rgb(214, 160, 0) solid;
            left: -30px;
            bottom: -20px;
        }
    </style>
</head>

<body>
    <div class="relative">
        <div class="box1">
            <p>box 1</p>
        </div>
        <div class="box2">
            <p>box 2</p>
        </div>
    </div>
    <p>gxhdrhethesh</p>

</body>

</html>
