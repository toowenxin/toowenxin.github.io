<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercise2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');

        body {
            font-family: "Space Grotesk", sans-serif;
            font-size: 24px;
            margin: 40px 150px;
        }

        .button1 {
            font-family: "Space Grotesk", sans-serif;
            font-size: 24px;
            background-color: white;
            padding: 20px 35px;
            border-radius: 16px;
        }

        .box1 {
            display: flex;
            align-items: center;
            gap: 20px;
            justify-content: space-between;
            padding-bottom: 30px;
        }

        .smallbox {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        h1 {
            font-size: 72px;
            padding-right: 150px;
            font-weight: 500;
        }

        .smallbox2 p {
            margin-right: 175px;
            line-height: 1.5;
        }

        .box2 {
            display: flex;
            justify-content: space-between;
            gap: 35px;
        }


        .smallbox2 {
            padding: 20px 0;
            width: 45%;
        }

        .box2 img {
            width: 40%;
            margin-top: 50px;
        }

        .button2 {
            background-color: black;
            color: white;
            font-family: "Space Grotesk", sans-serif;
            font-size: 24px;
            padding: 20px 35px;
            border-radius: 16px;
            margin-top: 20px;
        }

        .logo {
            display: flex;
            justify-content: space-between;
            margin: 70px 0;
        }

        .a {
            filter: grayscale(100%);
        }
    </style>
</head>

<body>
    <div class="box1">
        <div> <img src="images/logo.png" alt="logo" width="300"></div>
        <div class="smallbox">
            <div>About us</div>
            <div>Service</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <button class="button1">Request a quote</button>
        </div>
    </div>

    <div>
        <div class="box2">
            <div class="smallbox2">
                <div>
                    <h1>Navigating the digital landscape for success</h1>
                </div>
                <div>
                    <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                        including SEO, PPC, social media marketing, and content creation.</p>
                </div>
                <button class="button2">Book a consultation</button>
            </div>
            <img src="images/illustration.png" alt="illustration">

        </div>



    </div>
    <div class="logo">
        <img src="images/logo1.png" class="a" alt="logo">
        <img src="images/logo2.png" class="a" alt="logo">
        <img src="images/logo3.png" class="a" alt="logo">
        <img src="images/logo4.png" class="a" alt="logo">
        <img src="images/logo5.png" class="a" alt="logo">
        <img src="images/logo6.png" class="a" alt="logo">
    </div>

</body>

</html>
