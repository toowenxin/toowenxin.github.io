<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercise1</title>
    <style>
        button.a {
            background-color: black;
            color: white;
            padding: 10px 20px;
        }

        button.b {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        button.c {
            background-color: #f8da4a;
            color: black;
            border: none;
            padding: 10px 50px;
            border-radius: 20px;
        }

        button.d {
            background-color: #7354ad;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        button.e {
            background-color: white;
            color: #8c9296;
            padding: 10px 20px;
            border-radius: 5px;
            border: 2px #bdbec0 solid;
        }

        button.f {
            background-color: #2d65bc;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
        }

        button.g {
            background-color: white;
            color: #1f5cb4;
            border: 2px #1f5cb4 solid;
            padding: 10px 25px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <button class="a">Request now</button>
    <button class="b"><b>Sign up</b></button>
    <button class="c">Add to Cart</button><br><br>
    <button class="d"><b>Get started</b></button>
    <button class="e"><b>Download</b></button>
    <button class="f"><b>Apply on company website</b></button>
    <button class="g"><b>Save</b></button>
</body>

</html>
